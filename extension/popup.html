<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>Chrome Bridge</h1>
    <div class="status">
      <div id="indicator" class="indicator disconnected"></div>
      <span id="status-text">Disconnected</span>
    </div>
    <p class="info">WebSocket: <span id="ws-url">ws://localhost:8765</span></p>
    <div class="config">
      <label>Port <input type="number" id="port" min="1" max="65535"></label>
      <label>Token <input type="password" id="token" placeholder="(none)"></label>
      <label class="check"><input type="checkbox" id="instrument"> Capture page console &amp; metrics</label>
      <button id="save">Save &amp; Reconnect</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
